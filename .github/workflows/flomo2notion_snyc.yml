name: flomo2notion sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      FLOMO_TOKEN: ${{ secrets.FLOMO_TOKEN }}
      REF: ${{ github.ref }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 彻底清理并安装兼容性最好的版本
          pip uninstall -y notion-client
          pip install "notion-client==2.2.1" "urllib3<2"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          # 再次强制检查版本，防止被 requirements.txt 里的旧版覆盖
          pip install "notion-client==2.2.1"

      - name: flomo2notion sync
        run: |
          python -u flomo2notion.py
