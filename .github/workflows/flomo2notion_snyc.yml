name: flomo2notion sync

on:
  workflow_dispatch:
  schedule:
    - cron: "0 */3 * * *"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sync:
    name: Sync
    runs-on: ubuntu-latest
    env:
      NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
      NOTION_PAGE: ${{ secrets.NOTION_PAGE }}
      FLOMO_TOKEN: ${{ secrets.FLOMO_TOKEN }}
      REF: ${{ github.ref }}
      REPOSITORY: ${{ github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 1. 先卸载可能冲突的所有版本
          pip uninstall -y notion-client
          # 2. 显式安装 0.0.7 版本。
          # 很多旧版 flomo2notion 脚本其实是基于非常早期的 alpha 版 SDK 写的，
          # 那个版本里的 query 路径和现在完全不同。
          pip install notion-client==0.0.7
          pip install "urllib3<2"
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: flomo2notion sync
        run: |
          python -u flomo2notion.py
